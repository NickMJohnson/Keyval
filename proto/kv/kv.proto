syntax = "proto3";

package kv;

option go_package = "github.com/yourusername/keyval/proto/kv";

service KVService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  string value = 1;
  bool found = 2;
}

message PutRequest {
  string key = 1;
  string value = 2;
  uint64 request_id = 3;
  string client_id = 4;
}

message PutResponse {
  bool success = 1;
  string leader_addr = 2; // set if this node is not the leader
}

message DeleteRequest {
  string key = 1;
  uint64 request_id = 2;
  string client_id = 3;
}

message DeleteResponse {
  bool success = 1;
  string leader_addr = 2;
}
