syntax = "proto3";

package raft;

option go_package = "github.com/NickMJohnson/Keyval/proto/raft";

service RaftService {
  rpc RequestVote(RequestVoteArgs) returns (RequestVoteReply);
  rpc AppendEntries(AppendEntriesArgs) returns (AppendEntriesReply);
  rpc InstallSnapshot(SnapshotArgs) returns (SnapshotReply);
}

message LogEntry {
  uint64 term = 1;
  uint64 index = 2;
  bytes command = 3; // serialized KV command
}

message RequestVoteArgs {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteReply {
  uint64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesArgs {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesReply {
  uint64 term = 1;
  bool success = 2;
  uint64 conflict_index = 3; // optimization: skip back faster on rejection
  uint64 conflict_term = 4;
}

message SnapshotArgs {
  uint64 term = 1;
  string leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes data = 5;
}

message SnapshotReply {
  uint64 term = 1;
}
