services:
  node1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["-id", "node1", "-addr", ":8080", "-peers", "node2:8080,node3:8080", "-data-dir", "/var/lib/keyval"]
    ports:
      - "8081:8080"
    volumes:
      - node1-data:/var/lib/keyval
    networks:
      - raft

  node2:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["-id", "node2", "-addr", ":8080", "-peers", "node1:8080,node3:8080", "-data-dir", "/var/lib/keyval"]
    ports:
      - "8082:8080"
    volumes:
      - node2-data:/var/lib/keyval
    networks:
      - raft

  node3:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["-id", "node3", "-addr", ":8080", "-peers", "node1:8080,node2:8080", "-data-dir", "/var/lib/keyval"]
    ports:
      - "8083:8080"
    volumes:
      - node3-data:/var/lib/keyval
    networks:
      - raft

volumes:
  node1-data:
  node2-data:
  node3-data:

networks:
  raft:
    driver: bridge
